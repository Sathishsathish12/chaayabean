<h1>Your Cart</h1>

{% for item in cart_items %}
    <h3>{{ item.product.name }}</h3>
    <p>Price: ₹{{ item.product.price }}</p>
    <p>Qty: {{ item.quantity }}</p>

    <p>Total: ₹{{ item.item_total }}</p>
{% endfor %}

<h2>Total = ₹{{ total }}</h2>

<a href="{% url 'checkout' %}">
    <button>Place Order</button>
</a>
